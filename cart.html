<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>장바구니 품의목록 자동화 (천안버들유)</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
body{background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:#1e293b;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.topbar h1{font-size:1rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;}
.site-badge{padding:3px 10px;border-radius:4px;font-size:.72rem;font-weight:800;background:#4285f4;color:#fff;display:none;}
.summary-wrap{display:flex;gap:10px;}
.summary-card{background:rgba(255,255,255,.1);padding:6px 14px;border-radius:8px;text-align:right;}
.summary-card span{font-size:.72rem;color:#94a3b8;}
.summary-card strong{display:block;font-size:1rem;color:#60a5fa;font-weight:700;}
.toolbar{padding:12px 24px;display:flex;gap:8px;background:#fff;border-bottom:1px solid #e2e8f0;align-items:center;}
.btn{padding:8px 16px;border:none;border-radius:7px;font-weight:600;font-size:.83rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s;}
.btn-excel{background:#10b981;color:#fff;}
.btn-excel:hover{background:#0da872;}
.btn-clear{background:transparent;border:1px solid #e2e8f0;color:#94a3b8;}
.btn-clear:hover{background:#fee2e2;color:#ef4444;border-color:#fca5a5;}
.install-panel{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;margin:20px 24px;padding:18px 20px;}
.install-panel h2{font-size:.9rem;font-weight:700;margin-bottom:12px;color:#334155;}
.install-steps{font-size:.82rem;color:#475569;line-height:2.2;}
.install-steps b{color:#1e293b;}
.bm-row{display:flex;align-items:center;gap:12px;margin-top:14px;background:#fff;border:1.5px dashed #c0c8d8;border-radius:8px;padding:12px 16px;}
.bm-btn{display:inline-block;padding:9px 18px;border-radius:7px;font-size:.83rem;font-weight:700;color:#fff;cursor:grab;text-decoration:none;user-select:none;white-space:nowrap;flex-shrink:0;background:#4285f4;}
.bm-hint{font-size:.76rem;color:#888;line-height:1.6;}
.bm-hint b{color:#444;}
.table-wrap{flex:1;padding:20px 24px;overflow-y:auto;}
.table-box{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
th,td{padding:10px 12px;font-size:.85rem;border-bottom:1px solid #e2e8f0;text-align:center;}
th{background:#f8fafc;font-weight:600;color:#475569;}
td:nth-child(2),td:nth-child(3){text-align:left;}
.edit-input{width:100%;border:1px solid transparent;background:transparent;padding:3px 5px;font-size:.85rem;font-family:inherit;border-radius:4px;}
.edit-input:focus{border-color:#3b82f6;background:#fff;outline:none;}
.del-btn{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px;}
.del-btn:hover{color:#ef4444;background:#fee2e2;}
</style>
</head>
<body>

<div class="topbar">
  <h1>🛒 장바구니 품의목록 <span style="font-size:.75rem;color:#94a3b8;font-weight:400;">v2.7-test</span> <span class="site-badge" id="siteBadge">쿠팡</span></h1>
  <div class="summary-wrap">
    <div class="summary-card"><span>품목 수</span><strong id="sumCount">0건</strong></div>
    <div class="summary-card"><span>합계금액</span><strong id="sumTotal">0원</strong></div>
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-excel" onclick="exportExcel()">📥 엑셀 다운로드</button>
  <button class="btn btn-clear" onclick="clearAll()">🗑 목록 초기화</button>
</div>

<div class="install-panel" id="installPanel">
  <h2>📌 북마클릿 설치 방법 (최초 1회)</h2>
  <div class="install-steps">
    <b>①</b> 브라우저 북마크바 표시: <b>Ctrl+Shift+B</b><br>
    <b>②</b> 아래 파란 버튼을 <b>북마크바로 드래그</b>하여 저장<br>
    <b>③</b> 쇼핑몰 장바구니에서 상품 체크 후 해당 북마클릿 클릭<br>
    <b>④</b> 새 탭에 품의목록이 자동으로 표시됩니다
  </div>
  <div class="bm-row">
    <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
    <a class="bm-btn" id="bmBtn" href="#">🛒 쿠팡 장바구니 추출</a>
    <a class="bm-btn" id="bmGmarket" href="#" style="background:#2e3192;">🛒 G마켓 장바구니 추출</a>
    <a class="bm-btn" id="bm11st" href="#" style="background:#cc0000;">🛒 11번가 장바구니 추출</a>
  </div>
    <div class="bm-hint">← <b>북마크바로 드래그</b>하여 설치<br>쿠팡 장바구니 페이지에서만 작동합니다</div>
  </div>
</div>

<div class="table-wrap" id="tableWrap" style="display:none;">
  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th style="width:44px;"><input type="checkbox" id="chkAll" checked onchange="toggleAll(this.checked)"></th>
          <th style="width:38%;">상품명</th>
          <th>규격(옵션)</th>
          <th style="width:58px;">단위</th>
          <th style="width:70px;">수량</th>
          <th style="width:110px;text-align:right;padding-right:16px;">단가</th>
          <th style="width:40px;"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
var items = [];

/* ── 북마클릿을 이 파일의 실제 URL 기반으로 동적 생성 ── */
window.addEventListener('load', function() {

  // 이 페이지의 URL (북마클릿이 돌아올 주소)
  var thisURL = location.href.split('#')[0];

  // 북마클릿 코드: 쿠팡에서 실행, sessionStorage에 저장 후 이 페이지로 이동
  var bmCode = 'javascript:(function(){' +
    'var items=[];' +
    'var seen={};' +
    'document.querySelectorAll("input[type=checkbox]:checked").forEach(function(cb){' +
      'var c=cb.parentElement.parentElement.parentElement;' +
      'var t=c.innerText;' +
      'var allP=t.match(/([\\d,]+)\\s*원/g);' +
      'if(!allP)return;' +
      'var nm=t.match(/^([\\s\\S]+?)옵션:/);' +
      'var name=nm?nm[1].trim():(t.match(/^([\\s\\S]+?)삭제/)?t.match(/^([\\s\\S]+?)삭제/)[1].trim():"");' +
      'if(!name)return;' +
      'if(seen[name])return;seen[name]=true;' +
      'var sm=t.match(/옵션:\\s*([^\\n]+)/);' +
      'var sr=sm?sm[1].trim():"";' +
      'var discM=t.match(/\\d+%\\s*([\\d,]+)\\s*원/);' +
      'var price=discM?parseInt(discM[1].replace(/,/g,"")):parseInt(allP[0].replace(/[^\\d]/g,""));' +
      'if(!price)return;' +
      'var spec=sr.replace(/,?\\s*\\d+개$/,"").trim();' +
      'items.push({name:name,spec:spec,unit:"개",qty:1,price:price,selected:true,site:"쿠팡"});' +
    '});' +
    // 총 배송비 추출
    'var shipEl=Array.from(document.querySelectorAll("*")).find(function(el){return el.children.length<3&&el.innerText&&el.innerText.trim().startsWith("\uCD1D \uBC30\uc1A1\ube44")&&el.innerText.includes("\uC6D0")&&el.innerText.length<30;});' +
    'if(shipEl){' +
      'var shipMatch=shipEl.innerText.match(/([\\d,]+)\\s*\uC6D0/);' +
      'var shipPrice=shipMatch?parseInt(shipMatch[1].replace(/,/g,"")):0;' +
      'if(shipPrice>0)items.push({name:"\uBC30\uC1A1\uBE44",spec:"",unit:"\uC2DD",qty:1,price:shipPrice,selected:true,site:"\uCFE0\uD321"});' +
    '}' +
    'if(!items.length){alert("\uCCB4\uD06C\uB41C \uC0C1\uD488\uC744 \uCC3E\uC9C0 \uBABB\uD588\uC2B5\uB2C8\uB2E4.\\n\uC0C1\uD488\uC744 \uCCB4\uD06C\uD588\uB294\uC9C0 \uD655\uC778\uD574\uC8FC\uC138\uC694.");return;}' +
    'var enc=encodeURIComponent(JSON.stringify(items));' +
    'window.open("https://kirakein-gif.github.io/cart.html#"+enc,"_blank");' +
  '})();';

  document.getElementById('bmBtn').href = bmCode;

  // 지마켓 북마클릿
  var bmGmarket = 'javascript:(function(){' +
    'var items=[];' +
    'document.querySelectorAll("input[type=checkbox]:checked").forEach(function(cb){' +
      'if(cb.parentElement.parentElement.innerText.length>0)return;' +
      'var c=cb.parentElement.parentElement.parentElement;' +
      'var t=c.innerText;' +
      'if(!t.includes("\uc0c1\ud488\uba85:"))return;' +
      'var nm=t.match(/\uc0c1\ud488\uba85:\\n(.+?)\\n/);' +
      'var name=nm?nm[1].trim():"";' +
      'if(!name)return;' +
      'var blocks=t.split("\uad6c\ub9e4\ud560 \uc0c1\ud488 \uc0c1\uc138 \uc815\ubcf4");' +
      'blocks.forEach(function(block){' +
        'if(!block.includes("\uc0c1\ud488 \uae08\uc561 :"))return;' +
        'var op=block.match(/\uc635\uc158\uc120\ud0dd \uc815\ubcf4\\n(.+?)\\n/);' +
        'var spec=op?op[1].trim():"";' +
        'var qm=block.match(/\uc0c1\ud488 \uc218\\s+(\\d+)\\s+\uc99d\uac00/);' +
        'var qty=qm?parseInt(qm[1]):1;' +
        'var pm=block.match(/\uc0c1\ud488 \uae08\uc561 :\\n([\\d,]+)\uc6d0/);' +
        'var price=pm?parseInt(pm[1].replace(/,/g,"")):0;' +
        'if(!price)return;' +
        'items.push({name:name,spec:spec,unit:"\uac1c",qty:qty,price:price,selected:true,site:"G\ub9c8\ucf93"});' +
      '});' +
    '});' +
    'var shipLi=Array.from(document.querySelectorAll("li")).find(function(el){' +
      'var t=el.innerText;' +
      'return t.startsWith("\ubc30\uc1a1\ube44\\n")&&t.includes("\uc6d0")&&!t.includes("\ubb34\ub8cc")&&t.length<15;' +
    '});' +
    'if(shipLi){' +
      'var sm=shipLi.innerText.match(/([\\d,]+)\uc6d0/);' +
      'var sp=sm?parseInt(sm[1].replace(/,/g,"")):0;' +
      'if(sp>0)items.push({name:"\ubc30\uc1a1\ube44",spec:"",unit:"\uc2dd",qty:1,price:sp,selected:true,site:"G\ub9c8\ucf93"});' +
    '}' +
    'if(!items.length){alert("\uccb4\ud06c\ub41c \uc0c1\ud488\uc744 \ucc3e\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4.");return;}' +
    'var enc=encodeURIComponent(JSON.stringify(items));' +
    'window.open("https://kirakein-gif.github.io/cart.html#"+enc,"_blank");' +
  '})();';
  document.getElementById('bmGmarket').href = bmGmarket;

  // 11번가 북마클릿
  var bm11st = 'javascript:(function(){' +
    'var items=[];' +
    'var bundleSeen={};' +
    'document.querySelectorAll("input[type=checkbox]:checked").forEach(function(cb){' +
      'var c=cb.parentElement.parentElement;' +
      'var t=c.innerText;' +
      'if(t.length<100)return;' +
      'var name=t.split("\\n")[0].trim();' +
      'if(!name)return;' +
      'var op=t.match(/\uc635\uc158\\n(.+?)\\n/);' +
      'var spec=op?op[1].trim():"";' +
      'var qm=t.match(/(\\d+)\ucfe0\ud3f0\ubcc0\uacbd/);' +
      'var qty=qm?parseInt(qm[1]):1;' +
      'var pm=t.match(/\ud560\uc778\ubaa8\uc74c\uac00\\n([\\d,]+)\uc6d0/)||t.match(/\ud310\ub9e4\uac00\\n([\\d,]+)\uc6d0/);' +
      'var price=pm?Math.floor(parseInt(pm[1].replace(/,/g,""))/qty):0;' +
      'if(!price)return;' +
      'items.push({name:name,spec:spec,unit:"\uac1c",qty:qty,price:price,selected:true,site:"11\ubc88\uac00"});' +
      // 배송비 처리: 묶음이면 그룹당 1회, 아니면 상품마다
      'var grp=c.parentElement.parentElement.parentElement.parentElement;' +
      'var hasBungle=grp.innerText.includes("\ubb36\uc74c");' +
      'if(hasBungle){' +
        'var grpId=grp.className+"|"+grp.id;' +
        'if(!bundleSeen[grpId]){' +
          'bundleSeen[grpId]=true;' +
          'var bm=grp.innerText.match(/\ubb36\uc74c \ubc30\uc1a1\ube44 ([\\d,]+)\uc6d0/);' +
          'var ship=bm?parseInt(bm[1].replace(/,/g,"")):0;' +
          'if(ship>0)items.push({name:"\ubc30\uc1a1\ube44(\ubb36\uc74c)",spec:"",unit:"\uc2dd",qty:1,price:ship,selected:true,site:"11\ubc88\uac00"});' +
        '}' +
      '}else{' +
        'var ind=t.match(/\ubc30\uc1a1\ube44\\n\\n\ub3c4\uc6c0\ub9d0\\n\ubc30\uc1a1\ube44\\n\\n([\\d,]+)\uc6d0/);' +
        'var ship=ind?parseInt(ind[1].replace(/,/g,"")):0;' +
        'if(ship>0)items.push({name:"\ubc30\uc1a1\ube44",spec:"",unit:"\uc2dd",qty:1,price:ship,selected:true,site:"11\ubc88\uac00"});' +
      '}' +
    '});' +
    'if(!items.length){alert("\uccb4\ud06c\ub41c \uc0c1\ud488\uc744 \ucc3e\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4.");return;}' +
    'var enc=encodeURIComponent(JSON.stringify(items));' +
    'window.open("https://kirakein-gif.github.io/cart.html#"+enc,"_blank");' +
  '})();';
  document.getElementById('bm11st').href = bm11st;

  // URL 해시에서 데이터 읽기
  var hash = location.hash.slice(1);
  if (hash) {
    try {
      items = JSON.parse(decodeURIComponent(hash));
      history.replaceState(null, '', location.pathname);
      if (items.length) {
        document.getElementById('installPanel').style.display = 'none';
        document.getElementById('tableWrap').style.display = 'block';
        document.getElementById('siteBadge').style.display = 'inline-block';
        render();
      }
    } catch(e) {}
  }
});

function render() {
  var tbody = document.getElementById('tbody');
  tbody.innerHTML = items.map(function(it, idx) {
    var nv = (it.name||'').replace(/"/g,'&quot;');
    var sv = (it.spec||'').replace(/"/g,'&quot;');
    return '<tr>' +
      '<td><input type="checkbox"'+(it.selected?' checked':'')+' onchange="setField('+idx+',\'selected\',this.checked)"></td>' +
      '<td><input class="edit-input" value="'+nv+'" onblur="setField('+idx+',\'name\',this.value)"></td>' +
      '<td><input class="edit-input" style="color:#3b82f6" value="'+sv+'" onblur="setField('+idx+',\'spec\',this.value)"></td>' +
      '<td><input class="edit-input" value="'+(it.unit||'개')+'" onblur="setField('+idx+',\'unit\',this.value)"></td>' +
      '<td><input class="edit-input" value="'+(it.qty||1)+'" onblur="setField('+idx+',\'qty\',this.value)"></td>' +
      '<td style="text-align:right;padding-right:16px;"><input class="edit-input" style="text-align:right" value="'+(it.price||0).toLocaleString()+'" onblur="setField('+idx+',\'price\',this.value)"></td>' +
      '<td><button class="del-btn" onclick="deleteRow('+idx+')" title="삭제">✕</button></td>' +
    '</tr>';
  }).join('');
  updateSummary();
}

function setField(idx, field, val) {
  if(field==='qty'||field==='price') items[idx][field]=parseInt(String(val).replace(/,/g,''))||0;
  else items[idx][field]=val;
  if(field!=='selected') render(); else updateSummary();
}
function deleteRow(idx){items.splice(idx,1);if(!items.length)clearAll();else render();}
function toggleAll(checked){items.forEach(function(i){i.selected=checked;});render();}
function updateSummary(){
  var sel=items.filter(function(i){return i.selected;});
  var total=sel.reduce(function(acc,i){return acc+(i.qty*i.price);},0);
  document.getElementById('sumCount').innerText=sel.length+'건';
  document.getElementById('sumTotal').innerText=total.toLocaleString()+'원';
  var chkAll=document.getElementById('chkAll');
  if(chkAll) chkAll.checked=sel.length===items.length&&items.length>0;
}
function clearAll(){
  items=[];
  document.getElementById('installPanel').style.display='block';
  document.getElementById('tableWrap').style.display='none';
  document.getElementById('siteBadge').style.display='none';
  updateSummary();
}
function exportExcel(){
  var sel=items.filter(function(i){return i.selected;});
  if(!sel.length){alert('선택된 항목이 없습니다.');return;}
  var data=sel.map(function(i){return{'내용':i.name,'규격(옵션)':i.spec||'','단위':i.unit||'개','수량':i.qty,'예상단가':i.price};});
  var ws=XLSX.utils.json_to_sheet(data);
  ws['!cols']=[{wch:40},{wch:20},{wch:8},{wch:8},{wch:12}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'품목내역');
  var now=new Date();
  var stamp=now.getFullYear()+('0'+(now.getMonth()+1)).slice(-2)+('0'+now.getDate()).slice(-2);
  XLSX.writeFile(wb,'장바구니품의목록_'+stamp+'.xlsx');
}
</script>
</body>
</html>
